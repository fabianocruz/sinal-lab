# Railway services declaration for Sinal.lab
#
# This file is NOT read by Railway — config is set via the dashboard.
# It serves as the source of truth for all Railway services and their settings.
#
# Services:
#   api          — FastAPI backend (always running)
#   cron-agents  — Single daily cron that dispatches agents by weekday
#                  Schedule is defined in scripts/run_cron.py (SCHEDULE dict)
#                  Mon: codigo, radar, sintese, funding | Wed: mercado
#
# To set up in Railway Dashboard:
# 1. New Service → select repo sinal-lab
# 2. Builder: Dockerfile (same image as API)
# 3. Start Command: copy from below
# 4. Cron Schedule: copy from below (cron-agents only)
# 5. Variables: use Shared Variables (DATABASE_URL, ANTHROPIC_API_KEY, etc.)

[services.api]
start_command = "uvicorn apps.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[services.cron-agents]
cron_schedule = "0 4 * * *"   # Daily 04:00 UTC — dispatches agents by weekday
start_command = "python scripts/run_cron.py"
